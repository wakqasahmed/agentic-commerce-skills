name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: List skills
        run: scripts/list-skills.sh | grep -q "skills/agentic-commerce/readiness-audit/SKILL.md"
      - name: Validate plugin paths
        run: python3 scripts/validate-plugin.py
      - name: Run commerce-protocol-readiness guardrail eval
        run: python3 skills/agentic-commerce/commerce-protocol-readiness/eval/run.py
