name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify migration notice
        run: |
          grep -q 'npx skills@latest add wakqasahmed/skills' README.md
          grep -q 'historical reference' README.md
      - name: Verify aggregate dispatch is retired
        run: '! rg -l "aggregate-dispatch|notify-aggregate|AGGREGATE_DISPATCH_TOKEN" .github/workflows -g "!ci.yml"'
